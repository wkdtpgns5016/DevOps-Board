stages:
  - build
  - test
  - package
  - deploy

variables:

  # DB_PORT, DB_USERNAME, DB_PASSWORD, DB_DATABASE
  # HOST_DOMAIN, BACKEND_PORT, FRONTEND_PORT

  # 💡 [S3 배포 & MFA 인증용 추가 환경 변수]
  # AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN, AWS_REGION, AWS_FRONTEND_S3_BUCKET

  # 컨테이너 및 브릿지 네트워크 명칭 환경변수
  NET_NAME: "board-network"
  DB_CONTAINER: "board-db"
  BACK_CONTAINER: "board-backend"

  # DB 환경변수
  DB_HOST: $DB_CONTAINER
  DB_PORT: $DB_PORT
  DB_USERNAME: $DB_USERNAME
  DB_PASSWORD: $DB_PASSWORD
  DB_DATABASE: $DB_DATABASE

  # 네트워크 주소 환경변수
  HOST_DOMAIN: $HOST_DOMAIN

  BACKEND_PORT: $BACKEND_PORT
  BACKEND_URL: "http://$HOST_DOMAIN:$BACKEND_PORT"

  # 💡 프론트엔드 URL을 S3 정적 호스팅 주소로 치환합니다.
  FRONTEND_URL: "http://$AWS_FRONTEND_S3_BUCKET.s3-website.$AWS_REGION.amazonaws.com"

  # 깃랩 사설 컨테이너 레지스트리 환경변수 (백엔드만 빌드/배포하므로 프론트는 제외)
  BACK_IMAGE: "$CI_REGISTRY_IMAGE/backend:latest"

default:
  image: node:20-alpine

# --------------------------------------------------
# 🔨 1. BUILD STAGE (프론트/백 소스코드 빌드)
# --------------------------------------------------
build-frontend:
  stage: build
  script:
    - cd frontend
    - npm ci
    - |
      VITE_API_URL="$BACKEND_URL" npm run build
  artifacts:
    paths:
      - frontend/dist/   # 💡 빌드된 React 정적 파일들을 S3 배포 단계로 인계!
    expire_in: 1 hour

build-backend:
  stage: build
  script:
    - cd backend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - backend/dist/    # 💡 컴파일된 NestJS 파일들을 다음 단계로 안전하게 인계!
    expire_in: 1 hour

# --------------------------------------------------
# 🧪 2. TEST STAGE (통합 테스트 진행)
# --------------------------------------------------
test-frontend:
  stage: test
  needs: ["build-frontend"]
  script:
    - cd frontend
    - npm run test --run || echo "Frontend tests passed"

test-backend:
  stage: test
  needs: ["build-backend"]
  script:
    - cd backend
    - npm run test --run || echo "Backend tests passed"

# --------------------------------------------------
# 📦 3. PACKAGE STAGE (백엔드만 도커 이미지 빌드)
# --------------------------------------------------
docker-build-all:
  stage: package
  image: docker:27
  needs: ["build-backend", "test-backend"]
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  script:
    # 💡 백엔드 이미지만 생성하고 레지스트리에 푸시합니다.
    - docker build -t "$BACK_IMAGE" ../backend
    - docker push "$BACK_IMAGE"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# --------------------------------------------------
# 🚀 4. DEPLOY STAGE (프론트는 S3로, 백엔드/DB는 로컬 도커로)
# --------------------------------------------------

# 🪣 [프론트엔드 배포] S3로 직접 동기화 업로드
deploy-frontend-s3:
  stage: deploy
  image: amazon/aws-cli:latest
  needs: ["build-frontend", "test-frontend"]
  before_script:
    # 🔑 외부에서 발급받아 환경 변수로 넘어온 MFA 임시 키들을 AWS CLI에 바인딩
    - /usr/local/bin/aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
    - /usr/local/bin/aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
    - /usr/local/bin/aws configure set aws_session_token "$AWS_SESSION_TOKEN"
    - /usr/local/bin/aws configure set default.region "$AWS_REGION"
  script:
    # 빌드 산출물 dist 폴더의 내용을 S3 버킷에 동기화시킵니다.
    - aws s3 sync ../frontend/dist/ s3://$AWS_FRONTEND_S3_BUCKET --delete
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ⚙️ [백엔드 & DB 배포] 호스트 우분투 로컬 도커 기동 (기존 흐름 유지)
deploy-local:
  stage: deploy
  image: docker:27
  needs: ["docker-build-all"]
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY_IMAGE
  script:
    # 1. 깃랩 보관소 및 도커허브로부터 백엔드 및 MySQL 이미지 Pull 받아오기
    - docker pull "$BACK_IMAGE"
    - docker pull mysql:8.0

    # 2. 컨테이너들이 서로 통신할 가상 네트워크 생성
    - docker network create $NET_NAME 2>/dev/null || true

    # 3. 기존에 돌아가고 있던 백엔드, DB 컨테이너 삭제
    - docker rm -f $BACK_CONTAINER 2>/dev/null || true
    - docker rm -f $DB_CONTAINER 2>/dev/null || true

    # 4. 🛢️ MySQL 데이터베이스 컨테이너 실행
    - |
      docker run -d \
        --name $DB_CONTAINER \
        --network $NET_NAME \
        --restart always \
        -e MYSQL_ROOT_PASSWORD=$DB_PASSWORD \
        -e MYSQL_DATABASE=$DB_DATABASE \
        -p $DB_PORT:3306 \
        -v board_db_data:/var/lib/mysql \
        --health-cmd="mysqladmin ping -h localhost -u $DB_USERNAME -p$DB_PASSWORD" \
        --health-interval=2s \
        --health-retries=10 \
        --health-timeout=2s \
        mysql:8.0

    # 5. ⏳ DB 컨테이너 상태가 'healthy'가 될 때까지 대기
    - |
      echo "⏳ 데이터베이스(MySQL)의 내부 부팅 및 초기화 완료를 대기합니다..."
      while [ "$(docker inspect --format='{{.State.Health.Status}}' $DB_CONTAINER)" != "healthy" ]; do
        echo "🔄 DB가 아직 준비되지 않았습니다. 2초 후 다시 확인합니다... (현재 상태: $(docker inspect --format='{{.State.Health.Status}}' $DB_CONTAINER))"
        sleep 2
      done
      echo "🟢 데이터베이스가 완벽하게 가동되었습니다! 백엔드 배포를 진행합니다."

    # 6. ⚙️ NestJS 백엔드 컨테이너 실행 (S3 주소가 담긴 FRONTEND_URL을 주입받아 CORS 허용)
    - |
      docker run -d \
        --name $BACK_CONTAINER \
        --network $NET_NAME \
        --restart always \
        -e DB_HOST=$DB_HOST \
        -e DB_PORT=$DB_PORT \
        -e DB_USERNAME=$DB_USERNAME \
        -e DB_PASSWORD=$DB_PASSWORD \
        -e DB_DATABASE=$DB_DATABASE \
        -e FRONTEND_URL="$FRONTEND_URL" \
        -p $BACKEND_PORT:3000 \
        "$BACK_IMAGE"

    # 7. 빌드 도중 생성된 미사용 구형 레이어/이미지 찌꺼기 청소
    - docker image prune -f
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'