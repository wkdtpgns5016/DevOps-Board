services:
  gitlab:
    image: 'gitlab/gitlab-ee:16.1.0-ee.0'
    container_name: gitlab
    restart: always
    hostname: 'gitlab.sehjang.kro.kr'
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://gitlab.sehjang.kro.kr'
        nginx['listen_https'] = false
        nginx['listen_port'] = 80
        registry_external_url 'http://gitlab.sehjang.kro.kr:5050'
        gitlab_rails['registry_enabled'] = true
      TZ: 'Asia/Seoul'
    ports:
      - '80:80'
      - '443:443'
      - '5050:5050'
    volumes:
      - './config:/etc/gitlab'
      - './logs:/var/log/gitlab'
      - './data:/var/opt/gitlab'