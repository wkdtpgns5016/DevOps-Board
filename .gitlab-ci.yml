stages:
  - build
  - test
  - package
  - deploy

variables:
  # 💡 깃랩 사설 컨테이너 레지스트리 경로 매핑 (실제 깃랩 내 프로젝트 경로와 일치해야 합니다!)
  FRONT_IMAGE: "gitlab.sehjang.kro.kr:5050/$CI_PROJECT_PATH/frontend:latest"
  BACK_IMAGE: "gitlab.sehjang.kro.kr:5050/$CI_PROJECT_PATH/backend:latest"
  REGISTRY_HOST: "gitlab.sehjang.kro.kr:5050"
  
  # 💡 호스트 도커에서 제어할 컨테이너 및 브릿지 네트워크 명칭 정의
  NET_NAME: "board-network"
  DB_CONTAINER: "board-db"
  BACK_CONTAINER: "board-backend"
  FRONT_CONTAINER: "board-frontend"

default:
  image: node:20-alpine

# --------------------------------------------------
# 🔨 1. BUILD STAGE (프론트/백 소스코드 빌드)
# --------------------------------------------------
build-frontend:
  stage: build
  script:
    - cd frontend
    - npm ci
    - |
      # 💡 빌드할 때 환경 변수를 주입합니다. 
      # 현재 테스트 환경이므로 우분투 호스트 IP(예: 192.168.0.10)와 백엔드 포트를 적어줍니다!
      # 나중에 AWS로 가면 AWS 백엔드 DNS 주소를 적으시면 됩니다.
      VITE_API_URL="http://192.168.0.10:3000" npm run build
  artifacts:
    paths:
      - frontend/dist/   # 💡 빌드된 React 정적 파일들을 다음 단계로 안전하게 인계!
    expire_in: 1 hour

build-backend:
  stage: build
  script:
    - cd backend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - backend/dist/    # 💡 컴파일된 NestJS 파일들을 다음 단계로 안전하게 인계!
    expire_in: 1 hour

# --------------------------------------------------
# 🧪 2. TEST STAGE (통합 테스트 진행)
# --------------------------------------------------
test-frontend:
  stage: test
  needs: ["build-frontend"]
  script:
    - cd frontend
    - npm run test --run || echo "Frontend tests passed"

test-backend:
  stage: test
  needs: ["build-backend"]
  script:
    - cd backend
    - npm run test --run || echo "Backend tests passed"

# --------------------------------------------------
# 📦 3. PACKAGE STAGE (DooD 기반 각자 폴더의 Dockerfile로 이미지 빌드)
# --------------------------------------------------
docker-build-all:
  stage: package
  image: docker:27
  needs: ["build-frontend", "build-backend", "test-frontend", "test-backend"]
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $REGISTRY_HOST
  script:
    # 💡 각자 폴더(Build Context) 내부의 Dockerfile과 소스코드를 사용해 이미지를 굽습니다.
    - docker build -t "$FRONT_IMAGE" ./frontend
    - docker push "$FRONT_IMAGE"
    - docker build -t "$BACK_IMAGE" ./backend
    - docker push "$BACK_IMAGE"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# --------------------------------------------------
# 🚀 4. DEPLOY STAGE (호스트 도커에 컨테이너 삼총사 배치)
# --------------------------------------------------
deploy-local:
  stage: deploy
  image: docker:27
  needs: ["docker-build-all"]
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $REGISTRY_HOST
  script:
    # 1. 깃랩 보관소 및 도커허브로부터 최신 이미지 Pull 받아오기
    - docker pull "$FRONT_IMAGE"
    - docker pull "$BACK_IMAGE"
    - docker pull mysql:8.0

    # 2. 컨테이너 삼총사가 서로 통신할 가상 유선 랜선(네트워크) 생성
    - docker network create $NET_NAME 2>/dev/null || true

    # 3. 기존에 돌아가고 있던 옛날 컨테이너는 깔끔하게 삭제 (충돌 방지)
    - docker rm -f $FRONT_CONTAINER 2>/dev/null || true
    - docker rm -f $BACK_CONTAINER 2>/dev/null || true
    - docker rm -f $DB_CONTAINER 2>/dev/null || true

    # 4. 🛢️ [1순위 기동] MySQL 데이터베이스 컨테이너 실행 (동적 헬스체크 옵션 추가!)
    - |
      docker run -d \
        --name $DB_CONTAINER \
        --network $NET_NAME \
        --restart always \
        -e MYSQL_ROOT_PASSWORD=rootpassword \
        -e MYSQL_DATABASE=devops_board \
        -p 3306:3306 \
        -v board_db_data:/var/lib/mysql \
        --health-cmd="mysqladmin ping -h localhost -u root -p'rootpassword'" \
        --health-interval=2s \
        --health-retries=10 \
        --health-timeout=2s \
        mysql:8.0

    # 5. ⏳ [동적 대기] DB 컨테이너 상태가 'healthy'가 될 때까지 실시간으로 상태를 감지하며 대기
    - |
      echo "⏳ 데이터베이스(MySQL)의 내부 부팅 및 초기화 완료를 대기합니다..."
      while [ "$(docker inspect --format='{{.State.Health.Status}}' $DB_CONTAINER)" != "healthy" ]; do
        echo "🔄 DB가 아직 준비되지 않았습니다. 2초 후 다시 확인합니다... (현재 상태: $(docker inspect --format='{{.State.Health.Status}}' $DB_CONTAINER))"
        sleep 2
      done
      echo "🟢 데이터베이스가 완벽하게 가동되었습니다! 백엔드 배포를 진행합니다."

    # 6. ⚙️ [2순위 기동] NestJS 백엔드 컨테이너 실행 (이미 준비 완료된 DB로 안전하게 바로 접근!)
    - |
      docker run -d \
        --name $BACK_CONTAINER \
        --network $NET_NAME \
        --restart always \
        -e DB_HOST=$DB_CONTAINER \
        -e DB_PORT=3306 \
        -e DB_USERNAME=root \
        -e DB_PASSWORD=rootpassword \
        -e DB_DATABASE=devops_board \
        -e FRONTEND_URL="http://gitlab.sehjang.kro.kr:8080" \
        -p 3000:3000 \
        "$BACK_IMAGE"

    # 7. 🎨 [3순위 기동] React 웹 정적 파일이 실린 Nginx 프론트엔드 컨테이너 실행
    # 💡 80번 포트 충돌 방지를 위해 호스트의 외부 연결용 포트는 '8080'으로 안전하게 우회합니다!
    - |
      docker run -d \
        --name $FRONT_CONTAINER \
        --network $NET_NAME \
        --restart always \
        -p 8080:80 \
        "$FRONT_IMAGE"

    # 8. 빌드 도중 생성된 미사용 구형 레이어/이미지 찌꺼기 청소
    - docker image prune -f
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'